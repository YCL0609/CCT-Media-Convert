<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API API Documentation Portal</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        h2 {
            margin-top: 25px;
            margin-bottom: 0;
            line-height: normal;
        }

        a {
            margin: 10px;
            font-size: large;
            color: #0066cc;
        }

        pre,
        code {
            margin: 0;
            background-color: #ccc;
        }

        @media (prefers-color-scheme: dark) {
            body {
                color: #fff;
                background-color: #222;
            }

            a {
                color: #7fffd4
            }

            pre,
            code {
                background-color: #555;
            }
        }
    </style>
</head>

<body>
    <h1>API Document</h1>
    <a href="/apidoc_zh">简体中文</a>
    <a href="/apidoc_en">English</a>
