<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CCT Media Convert</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div class="note-container" id="noteDiv"></div>

    <div class="header">
        <h1>CCT Media Convert</h1>
        <a href="/settings">程序配置</a>
        <a href="/apidoc">API 文档</a>
        <div class="status" id="JobStatus">运行状态未知</div>
        <div class="status" id="APIStatus">API 状态未知</div>
    </div>

    <div class="body" id="imgList"></div>

    <div class="footer">
        <div class="btn-group">
            <button id="refresh" class="btn btn-refresh" disabled>刷新列表</button>
            <button id="dojob" class="btn btn-dojob" disabled>处理选择</button>
            <!-- <button id="upload" class="btn btn-upload" disabled>上传</button> -->
            <!-- <button id="uploadP" class="btn btn-upload-process" disabled>上传并处理</button> -->
            <button id="delete" class="btn btn-delete" disabled>删除选定</button>
        </div>
        <div class="process" id="processBar">
            <div class="finish"></div>
            <div class="processing"></div>
            <div class="ignore"></div>
            <div class="wait"></div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
